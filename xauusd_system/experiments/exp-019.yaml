  Session windows (UTC):
  - London: 08:00-11:59 UTC (inclusive of 8,9,10,11 hours)
  - NY:     13:00-16:59 UTC (inclusive of 13,14,15,16 hours)
  - Blocked: 00-07 UTC (Asian session), 12 UTC (lunch), 17-23 UTC (after NY)

  These windows cover roughly 8 out of 24 hours, so expected trade count
  reduction is approximately 60-70% (most of the M15 bars are outside sessions).

