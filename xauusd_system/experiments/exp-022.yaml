  This experiment tests whether the H1 200-SMA gate (EXP-020) provides that
  regime gate naturally, WITHOUT requiring any look-ahead or explicit regime
  detection.

  Expected mechanism: during 2013's 30% gold crash, price spent the majority
  of Apr-Dec 2013 BELOW the H1 200-SMA, blocking most long entries. The SMA
  only lags by ~5-6 trading days (200 hours), so once gold broke structurally
  below the SMA, the gate would have closed quickly.

  Success criterion: combined 2013-2019 P&L in range -$10k to +$5k
  (vs EXP-016 baseline of -$40,543).

  If 2013 collapses from -$33k to something like -$5k to -$15k, the H1 gate
